const fs = require('fs');
const https = require('https');

const GITHUB_TOKEN = process.env.GH_TOKEN;
const USERNAME = 'saimonbardini';

async function fetchGitHubData() {
    const query = `
    {
      user(login: "${USERNAME}") {
        repositories(privacy: PUBLIC) { totalCount }
        contributionsCollection { totalCommitContributions }
        repositories(first: 100, ownerAffiliations: OWNER) {
          nodes {
            languages(first: 10, orderBy: {field: SIZE, direction: DESC}) {
              edges { size node { name color } }
            }
          }
        }
      }
    }`;

    return new Promise((resolve, reject) => {
        const req = https.request({
            hostname: 'api.github.com',
            path: '/graphql',
            method: 'POST',
            headers: {
                'Authorization': `bearer ${GITHUB_TOKEN}`,
                'User-Agent': 'NodeJS-Script',
                'Content-Type': 'application/json'
            }
        }, (res) => {
            let data = '';
            res.on('data', (chunk) => data += chunk);
            res.on('end', () => resolve(JSON.parse(data)));
        });
        req.on('error', reject);
        req.write(JSON.stringify({ query }));
        req.end();
    });
}

function processLanguages(data) {
    const langs = {};
    let totalSize = 0;
    data.user.repositories.nodes.forEach(repo => {
        repo.languages.edges.forEach(edge => {
            langs[edge.node.name] = {
                size: (langs[edge.node.name]?.size || 0) + edge.size,
                color: edge.node.color
            };
            totalSize += edge.size;
        });
    });

    return Object.entries(langs)
        .sort((a, b) => b[1].size - a[1].size)
        .slice(0, 5)
        .map(([name, info]) => ({
            name,
            percent: ((info.size / totalSize) * 100).toFixed(1),
            color: info.color
        }));
}

function generateSVG(stats, languages) {
    const width = 495;
    const height = 195;
    
    let langElements = languages.map((l, i) => `
        <g transform="translate(260, ${45 + (i * 28)})">
            <text x="0" y="10" fill="#c9d1d9" font-family="Segoe UI" font-size="12">${l.name}</text>
            <rect x="70" y="2" width="130" height="8" rx="4" fill="#21262d"/>
            <rect x="70" y="2" width="${(l.percent * 1.3)}" height="8" rx="4" fill="${l.color}"/>
            <text x="210" y="10" fill="#8b949e" font-family="Segoe UI" font-size="10">${l.percent}%</text>
        </g>
    `).join('');

    return `
    <svg width="${width}" height="${height}" viewBox="0 0 ${width}" fill="none" xmlns="http://www.w3.org/2000/svg">
        <style>
            .header { font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #58a6ff; }
            .stat { font: 400 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #c9d1d9; }
            .bold { font-weight: 700; fill: #f0f6fc; }
        </style>
        <rect width="${width-2}" height="${height-2}" x="1" y="1" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
        
        <text x="25" y="35" class="header">Dashboard de Estatísticas</text>
        
        <g transform="translate(25, 70)">
            <text x="0" y="0" class="stat">Repositórios Públicos: <tspan class="bold">${stats.repos}</tspan></text>
            <text x="0" y="30" class="stat">Total de Commits: <tspan class="bold">${stats.commits}</tspan></text>
            <text x="0" y="60" class="stat">Status: <tspan class="bold" fill="#238636">Ativo</tspan></text>
        </g>

        <line x1="240" y1="40" x2="240" y2="160" stroke="#30363d" />
        
        ${langElements}
    </svg>`;
}

async function main() {
    try {
        const data = await fetchGitHubData();
        if (data.errors) throw new Error(JSON.stringify(data.errors));

        const stats = {
            repos: data.data.user.repositories.totalCount,
            commits: data.data.user.contributionsCollection.totalCommitContributions
        };

        const languages = processLanguages(data.data);
        const svg = generateSVG(stats, languages);

        if (!fs.existsSync('assets')) fs.mkdirSync('assets');
        fs.writeFileSync('assets/stats.svg', svg);
        console.log('Stats geradas com sucesso!');
    } catch (error) {
        console.error('Erro:', error);
        process.exit(1);
    }
}

main();
```

